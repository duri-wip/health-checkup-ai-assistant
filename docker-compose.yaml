services:
  api-server:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      - ollama
    environment:
      - MOCK_API_URL=http://api-server:8000
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b

volumes:
  ollama_data:
